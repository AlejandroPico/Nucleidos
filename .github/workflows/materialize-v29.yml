name: Materialize Nucleidos v29 runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/materialize-v29.yml'
      - 'data/nucleidos-v29.js.gz.b64'
      - 'data/materialize-v29-trigger.txt'

permissions:
  contents: write

concurrency:
  group: materialize-nucleidos-v29
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Decode and validate runtime
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode data/nucleidos-v29.js.gz.b64 | gzip --decompress > /tmp/nucleidos-v29.js
          test -s /tmp/nucleidos-v29.js
          node --check /tmp/nucleidos-v29.js
          echo "Runtime bytes: $(wc -c < /tmp/nucleidos-v29.js)"

      - name: Commit generated runtime safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          for attempt in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/nucleidos-v29.js nucleidos-v29.js
            git add nucleidos-v29.js

            if git diff --cached --quiet; then
              echo 'Runtime v29 already materialized.'
              exit 0
            fi

            git commit -m 'Materializar runtime Nucleidos v29'
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 3))
          done

          echo 'Could not publish nucleidos-v29.js after four attempts.' >&2
          exit 1
