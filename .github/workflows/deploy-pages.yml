name: Deploy Nucleidos to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync IAEA LiveChart ground states
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Validate published files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            styles.css
            app.js
            nuclides.csv
            nuclides-data.js
            nucleidos-v27.css
            nucleidos-v27.js
            nucleidos-v28.css
            nucleidos-v28.js
            nucleidos-v29.css
            nucleidos-v29.js
            nucleidos-v30.css
            nucleidos-v30.js
            nucleidos-v31.css
            nucleidos-v31.js
          )
          for path in "${required[@]}"; do
            test -s "$path" || { echo "Missing or empty required file: $path" >&2; exit 1; }
          done
          grep -q 'nucleidos-v28.css' index.html
          grep -q 'nucleidos-v28.js' index.html
          grep -q 'nucleidos-v31.css' nucleidos-v28.css
          grep -q 'nucleidos-v31.js' nucleidos-v28.js
          grep -q 'nucleidos-v30.css' nucleidos-v31.css
          grep -q 'nucleidos-v30.js' nucleidos-v31.js
          node --check app.js
          node --check nucleidos-v29.js
          node --check nucleidos-v30.js
          node --check nucleidos-v31.js
          echo "Publishing commit $(git rev-parse HEAD)"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
